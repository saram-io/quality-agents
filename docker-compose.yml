version: '3.8'

services:
  # The frontend Dashboard interface
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gxp_validation_frontend
    ports:
      - "5173:80"
    restart: unless-stopped

  # The backend multi-agent qualification runner
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gxp_validation_backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: on-failure
